```html id="roulette-final"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Casino Roulette</title>
<style>
body {
    background: #075c3b;
    color: white;
    font-family: Arial;
    text-align: center;
}

/* Wheel */
.wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 20px auto;
}

.wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 10px solid #222;
    transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

.ball {
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform-origin: -140px center;
}

.pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
}

/* Table */
.table {
    display: grid;
    grid-template-columns: repeat(12, 40px);
    gap: 3px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 40px;
    height: 40px;
    line-height: 40px;
    border: 1px solid #fff;
    cursor: pointer;
    font-size: 14px;
}

.red { background: #b30000; }
.black { background: #111; }
.green { background: green; }

/* Controls */
.controls {
    margin-top: 15px;
}

input, button {
    padding: 8px;
    margin: 5px;
    font-size: 16px;
}
</style>
</head>
<body>

<h1>🎰 Casino Roulette</h1>
<p>Balance: $<span id="balance">100</span></p>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <div id="wheel" class="wheel"></div>
    <div id="ball" class="ball"></div>
</div>

<div class="controls">
    <input type="number" id="betAmount" placeholder="Bet Amount">
    <button onclick="betColor('red')">Red</button>
    <button onclick="betColor('black')">Black</button>
</div>

<h3>Pick a Number</h3>
<div id="table" class="table"></div>

<p id="result"></p>

<script>
let balance = 100;

const wheelNumbers = [
0,32,15,19,4,21,2,25,17,34,6,27,13,36,
11,30,8,23,10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

const redNumbers = new Set([
1,3,5,7,9,12,14,16,18,19,
21,23,25,27,30,32,34,36
]);

function getColor(n){
    if(n === 0) return "green";
    return redNumbers.has(n) ? "red" : "black";
}

/* Create wheel */
function createWheel(){
    const seg = 360 / wheelNumbers.length;
    let gradient = "conic-gradient(";

    wheelNumbers.forEach((n,i)=>{
        let c = n===0?"green":(redNumbers.has(n)?"red":"black");
        gradient += `${c} ${i*seg}deg ${(i+1)*seg}deg,`;
    });

    document.getElementById("wheel").style.background = gradient.slice(0,-1);
}

/* Create table */
function createTable(){
    const table = document.getElementById("table");

    for(let i=0;i<=36;i++){
        const div = document.createElement("div");
        div.className = "cell " + getColor(i);
        div.textContent = i;
        div.onclick = ()=>betNumber(i);
        table.appendChild(div);
    }
}

/* Spin animation with ball drop */
function spin(result){
    const index = wheelNumbers.indexOf(result);
    const seg = 360 / wheelNumbers.length;

    const wheel = document.getElementById("wheel");
    const ball = document.getElementById("ball");

    // Wheel rotation
    const spins = 6 * 360;
    const stopAngle = 360 - index * seg;
    wheel.style.transform = `rotate(${spins + stopAngle}deg)`;

    // Ball physics
    let angle = 0;
    let speed = 25;
    let radius = 140;

    const targetAngle = index * seg;

    const interval = setInterval(()=>{
        angle += speed;
        speed *= 0.985;
        radius -= 0.2;

        ball.style.transform =
          `rotate(${angle}deg) translateX(${radius}px)`;

        if(speed < 1){
            clearInterval(interval);

            // Drop into pocket
            ball.style.transition = "all 0.6s ease-out";
            ball.style.transform =
              `rotate(${targetAngle}deg) translateX(110px)`;

            // Bounce effect
            setTimeout(()=>{
                ball.style.transform =
                  `rotate(${targetAngle}deg) translateX(100px)`;
            },150);
        }

    },30);
}

/* Game logic */
function updateBalance(){
    document.getElementById("balance").textContent = balance;
}

function play(winCheck, payout){
    const bet = parseInt(document.getElementById("betAmount").value);

    if(!bet || bet > balance){
        document.getElementById("result").textContent = "Invalid bet";
        return;
    }

    const result = Math.floor(Math.random() * 37);
    spin(result);

    setTimeout(()=>{
        if(winCheck(result)){
            balance += bet * (payout + 1); // correct payout
            document.getElementById("result").textContent =
              `🎉 Win! ${result}`;
        } else {
            balance -= bet;
            document.getElementById("result").textContent =
              `❌ Lose! ${result}`;
        }

        if(balance <= 0){
            alert("Game over! Resetting balance.");
            balance = 100;
        }

        updateBalance();
    },5000);
}

/* Bets */
function betColor(c){
    play((n)=>getColor(n)===c,1);
}

function betNumber(n){
    play((r)=>r===n,35);
}

/* Init */
createWheel();
createTable();
updateBalance();
</script>

</body>
</html>
